enforcement:
  - event_source: tool
    tool: create_branch
    timing: pre
    actions:
      - type: check_branch_policy
        policy: base_restriction
        rules:
          hotfix: [main]
          epic: [main]
          feature: [main, "epic/*"]
          bug: [main, "epic/*"]
          fix: [main, "epic/*"]
          refactor: [main, "epic/*"]
          docs: [main, "epic/*"]

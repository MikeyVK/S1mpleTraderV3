enforcement:
  - event_source: tool
    tool: create_branch
    timing: pre
    actions:
      - type: check_branch_policy
        policy: base_restriction
        rules:
          hotfix: [main]
          epic: [main]
          feature: [main, "epic/*"]
          bug: [main, "epic/*"]
          fix: [main, "epic/*"]
          refactor: [main, "epic/*"]
          docs: [main, "epic/*"]
  - event_source: tool
    # Note: design §2.8 shows 'git_commit' but the actual tool name is 'git_add_or_commit'.
    # This is an intentional correction — 'git_add_or_commit' is the registered tool name.
    tool: git_add_or_commit
    timing: pre
    actions:
      - type: exclude_branch_local_artifacts
  - event_source: tool
    tool: create_pr
    timing: pre
    actions:
      - type: check_merge_readiness

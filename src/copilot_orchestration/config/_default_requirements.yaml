# _default_requirements.yaml
# Package-bundled default sub-role requirements.
# Authoritative source: design_v2_sub_role_orchestration.md §6.1 / §6.2 / §9.3
# Schema: roles.<role>.default_sub_role + roles.<role>.sub_roles.<name>.*

# Maximum character length for a sub-role name.  Used by detect_sub_role.__main__
# to truncate first-word input before passing it to the matching engine, preventing
# excessively long strings from reaching regex/difflib.  Must be larger than the
# longest sub-role name in this file ("validation-reviewer" = 19 chars).
max_sub_role_name_len: 40

roles:
  imp:
    default_sub_role: implementer
    sub_roles:
      researcher:
        requires_crosschat_block: false
        heading: "Research Output"
        block_template: ""
        markers:
          - "Problem Statement"
          - "Findings"
          - "Open Questions"
      planner:
        requires_crosschat_block: false
        heading: "Planning Output"
        block_template: ""
        markers:
          - "Cycle Breakdown"
          - "Deliverables Per Cycle"
          - "Stop-Go Criteria"
      designer:
        requires_crosschat_block: false
        heading: "Design Output"
        block_template: ""
        markers:
          - "Interface Contracts"
          - "Architecture Decisions"
      implementer:
        requires_crosschat_block: true
        heading: "Implementation Hand-Over"
        block_template: |-
          [{sub_role}] End your response with this block:

          ```text
          verifier
          Review the latest implementation work on this branch.

          {markers_list}
          ```
        markers:
          - "Scope"
          - "Files Changed"
          - "Proof"
          - "Ready-for-QA"
      validator:
        requires_crosschat_block: true
        heading: "Validation Hand-Over"
        block_template: |-
          [{sub_role}] End your response with this block:

          ```text
          verifier
          Review the latest validation work on this branch.

          {markers_list}
          ```
        markers:
          - "Test Surface"
          - "Results"
          - "Ready-for-QA"
      documenter:
        requires_crosschat_block: false
        heading: "Documentation Output"
        block_template: ""
        markers:
          - "Documents Changed"

  qa:
    default_sub_role: verifier
    sub_roles:
      plan-reviewer:
        requires_crosschat_block: false
        heading: "Planning Review"
        block_template: ""
        markers:
          - "Findings"
          - "Plan Coherence"
          - "Verdict"
      design-reviewer:
        requires_crosschat_block: false
        heading: "Design Review"
        block_template: ""
        markers:
          - "Findings"
          - "Architecture Compliance"
          - "Verdict"
      verifier:
        requires_crosschat_block: true
        heading: "Verification Review"
        block_template: |-
          [{sub_role}] End your response with this block:

          ```text
          implementer
          QA findings must be resolved before this cycle is done.

          {markers_list}
          ```
        markers:
          - "Findings"
          - "Proof Verification"
          - "Verdict"
      validation-reviewer:
        requires_crosschat_block: false
        heading: "Validation Review"
        block_template: ""
        markers:
          - "Findings"
          - "Coverage Assessment"
          - "Verdict"
      doc-reviewer:
        requires_crosschat_block: false
        heading: "Documentation Review"
        block_template: ""
        markers:
          - "Findings"
          - "Verdict"
